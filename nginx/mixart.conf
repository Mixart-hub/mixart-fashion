# ── Mixart Fashion — Nginx konfiguratsiyasi ───────────────────────────────────
# Joylashuv: /etc/nginx/sites-available/mixart.conf
# Faollashtirish: ln -s /etc/nginx/sites-available/mixart.conf /etc/nginx/sites-enabled/
#
# ALMASHTIRISH KERAK:
#   yourdomain.com → haqiqiy domeningiz
#   /var/www/mixart → serverda loyiha papkasi
# ─────────────────────────────────────────────────────────────────────────────

# Backend API (Node.js port 5000)
upstream mixart_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ── TWA Frontend (mobil) — yourdomain.com ────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # SSL uchun: certbot --nginx -d yourdomain.com -d www.yourdomain.com
    # (certbot qo'shgandan keyin bu blok avtomatik yangilanadi)

    root /var/www/mixart/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Statik fayllar cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # API → backend ga yo'naltirish
    location /api/ {
        proxy_pass         http://mixart_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Media (yuklangan rasmlar)
    location /media/ {
        proxy_pass http://mixart_api;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass         http://mixart_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # SSE (Server-Sent Events) — buffering o'chiriladi
    location /api/events {
        proxy_pass         http://mixart_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass 1;
        proxy_buffering    off;
        proxy_read_timeout 86400;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Admin panel — admin.yourdomain.com ────────────────────────────────────────
server {
    listen 80;
    server_name admin.yourdomain.com;

    # SSL uchun: certbot --nginx -d admin.yourdomain.com

    root /var/www/mixart/admin/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /api/ {
        proxy_pass         http://mixart_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /media/ {
        proxy_pass http://mixart_api;
        proxy_set_header Host $host;
        expires 7d;
    }

    location /socket.io/ {
        proxy_pass         http://mixart_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /api/events {
        proxy_pass         http://mixart_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_cache_bypass 1;
        proxy_buffering    off;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
